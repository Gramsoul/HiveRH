spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: HiveRH
  datasource:
    url: ${DB_URL}
    username:  ${DB_USER}
    password:  ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
